<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bus Stop ISCF 2026</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; font-family: 'Chakra Petch', sans-serif; }
        
        body { 
            background-color: #000000; color: #FFFFFF; 
            height: 100vh; height: 100dvh; 
            width: 100vw; display: flex; flex-direction: column; overflow: hidden;
            transition: background-color 0.5s;
        }
        body.flash-green { animation: alert-flash 1.5s infinite; }
        @keyframes alert-flash {
            0% { background-color: #000000; }
            50% { background-color: #004d1a; }
            100% { background-color: #000000; }
        }
        
        .app-container { 
            flex: 1; display: flex; flex-direction: column; 
            padding: 2vh 4vw; max-width: 1080px; margin: 0 auto; width: 100%; 
            height: 100%; z-index: 10;
        }
        
        header { text-align: center; margin-bottom: 2vh; flex-shrink: 0; }
        .logo { width: auto; max-width: 60%; height: 8vh; margin: 0 auto 1.5vh auto; display: block; object-fit: contain; }
        
        /* ปรับปรุงป้ายชื่อสถานีให้เป็น สีดำบนพื้นเหลือง (สไตล์ป้ายจราจร สู้แดดดีที่สุด) และขยายขนาด */
        .stop-status { 
            font-size: clamp(20px, 3vh, 36px); 
            color: #000000; 
            background: #FFD700; 
            font-weight: 700; 
            padding: 1.5vh 5vw; 
            border-radius: 50px; 
            display: inline-block; 
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4); 
            width: auto;
        }

        .lang-switcher { display: flex; justify-content: center; gap: 1.5vw; margin-bottom: 2vh; flex-shrink: 0; }
        .lang-btn { flex: 1; padding: 1.5vh 0.5vw; background: #222; color: #aaa; border: 2px solid #333; border-radius: 12px; font-size: clamp(12px, 1.8vh, 20px); font-weight: 700; cursor: pointer; transition: 0.2s; }
        .lang-btn.active { background: #00e676; color: #000; border-color: #00c853; box-shadow: 0 5px 15px rgba(0,230,118,0.3); }

        .main-display { flex: 1; display: flex; flex-direction: column; justify-content: space-between; align-items: center; width: 100%; min-height: 0; }
        
        .eta-container { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; width: 100%; min-height: 0; }
        
        /* เปลี่ยนคำว่า "รถจะถึงในอีก" เป็นสีขาวบริสุทธิ์ ตัวหนา และขยายใหญ่ */
        .eta-label { 
            color: #FFFFFF; 
            font-size: clamp(24px, 4vh, 45px); 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            margin-bottom: 0; 
            font-weight: 700;
        }
        
        /* ขยายตัวเลขนาทีให้ใหญ่ยักษ์เต็มตา พร้อมปรับเรืองแสงสีเขียวสว่างวาบ */
        .eta-value { 
            font-size: clamp(120px, 30vh, 450px); 
            font-weight: 700; 
            color: #FFFFFF; 
            line-height: 1; 
            text-shadow: 0 0 20px rgba(0, 255, 0, 0.8); 
            margin: 0; 
        }
        
        /* คำว่า "นาที" เปลี่ยนเป็นสีเหลืองทองเพื่อความเปรียบต่างสูง และขยายขนาด */
        .eta-unit { 
            color: #FFD700; 
            font-size: clamp(32px, 5vh, 60px); 
            font-weight: 700; 
            margin-top: 0; 
        }

        .bus-info-card { 
            background: linear-gradient(145deg, rgba(26,26,26,0.95), rgba(17,17,17,0.95)); width: 100%; border-radius: 30px; 
            padding: 3vh 5vw; margin-bottom: 1vh; border: 2px solid #333; 
            display: flex; flex-direction: column; gap: 2vh; box-shadow: 0 10px 30px rgba(0,0,0,0.5); flex-shrink: 0; 
        }
        .info-row { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2a2a2a; padding-bottom: 1.5vh; }
        .info-row:last-child { border-bottom: none; padding-bottom: 0; }
        
        /* เปลี่ยนหัวข้อข้อมูลรถเป็นสีเหลืองสว่าง และขยายขนาด */
        .info-label { 
            color: #FFD700; 
            font-size: clamp(22px, 3.5vh, 40px); 
            font-weight: 700; 
            white-space: nowrap; 
            flex-shrink: 0; 
            margin-right: 20px;
        }
        
        /* ขยายค่าข้อมูลตัวเลข/ชื่อสถานีในตารางรถให้ใหญ่ชัดเจน */
        .info-value { 
            color: #FFFFFF; 
            font-size: clamp(24px, 4vh, 45px); 
            font-weight: 700; 
            text-align: right; 
        }
        
        .marquee-container { max-width: 65%; overflow: hidden; white-space: nowrap; }
        
        /* ตัววิ่งสายรถเปลี่ยนเป็น Pure Green เรืองแสงสีเขียวเข้มเพื่อให้อ่านง่ายท่ามกลางแดด */
        .marquee-content { 
            display: inline-block; 
            color: #00FF00; 
            font-size: clamp(26px, 4.5vh, 50px); 
            font-weight: 700; 
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.5); 
        }
        .marquee-content.scroll { animation: scroll-left 6s linear infinite alternate; }
        @keyframes scroll-left { 0%, 15% { transform: translateX(0); } 85%, 100% { transform: translateX(var(--scroll-dist)); } }
        
        #view-sleep { flex: 1; display: none; flex-direction: column; justify-content: center; align-items: center; }
        .sleep-icon { font-size: clamp(60px, 15vh, 150px); margin-bottom: 2vh; text-shadow: 0 0 30px rgba(255,255,255,0.2); }
        .sleep-title { color: #fff; font-size: clamp(24px, 4vh, 45px); font-weight: 700; letter-spacing: 2px; }
        .sleep-subtitle { color: #00e676; font-size: clamp(16px, 2.5vh, 30px); margin-top: 1vh; font-weight: 500; }

        #log { font-size: 11px; color: #555; height: 5vh; overflow-y: scroll; background: #050505; padding: 1vh 2vw; border-top: 1px solid #111; flex-shrink: 0; z-index: 10; font-weight: 400;}
    </style>
</head>
<body>

    <audio id="bg-music" loop preload="auto"></audio>

    <div class="app-container">
        <header>
            <img src="bussing.png" alt="BUSSING TRANSIT" class="logo" onerror="this.style.display='none'; document.getElementById('alt-logo').style.display='block';">
            <h1 id="alt-logo" style="display:none; font-size: 4vh; color: #ff007f; margin-bottom: 1vh;">BUSSING<span style="color:#00e676">TRANSIT</span></h1>
            <div class="stop-status" id="ui-stop-name">📍 ป้าย: รถเมล์เดิ้ล เทศกาลอีสานสร้างสรรค์</div>
        </header>

        <div class="lang-switcher" id="lang-menu">
            <button class="lang-btn active" onclick="setUILanguage('TH')">TH</button>
            <button class="lang-btn" onclick="setUILanguage('EN')">EN</button>
            <button class="lang-btn" onclick="setUILanguage('CN')">中文</button>
            <button class="lang-btn" onclick="setUILanguage('LA')">ລາວ</button>
        </div>

        <div id="view-sleep">
            <div class="sleep-icon">🌙</div>
            <div class="sleep-title" id="ui-sleep-title">นอกเวลาให้บริการ</div>
            <div class="sleep-subtitle" id="ui-sleep-time">( 20:00 - 05:00 น. )</div>
        </div>

        <div id="view-tracking" class="main-display" style="display:none;">
            <div class="eta-container">
                <div class="eta-label" id="ui-eta-label">รถจะถึงในอีก</div>
                <div class="eta-value" id="eta-mins">-</div>
                <div class="eta-unit" id="ui-eta-unit">นาที</div>
            </div>

            <div class="bus-info-card">
                <div class="info-row">
                    <div class="info-label" id="ui-route-label">สายรถ:</div>
                    <div class="info-value marquee-container" id="route-wrapper">
                        <div id="bus-route-name" class="marquee-content">กำลังค้นหา...</div>
                    </div>
                </div>
                <div class="info-row">
                    <div class="info-label" id="ui-car-label">เบอร์รถ:</div>
                    <div class="info-value" id="bus-car-id">--</div>
                </div>
                <div class="info-row">
                    <div class="info-label" id="ui-dist-label">ระยะทาง:</div>
                    <div class="info-value"><span id="distance-km">-.-</span> <span id="ui-dist-unit">กม.</span></div>
                </div>
            </div>
        </div>
    </div>

    <div id="log">ระบบเริ่มทำงานอัตโนมัติ...</div>

    <script>
        const TARGET_STOP_LAT = 16.431053;  
        const TARGET_STOP_LNG = 102.835615; 

        let lastSpokenEta = null;
        let isFirstCalculation = true;
        let audioCtx = null;
        let availableVoices = [];
        let currentLang = 'TH'; 
        let appStarted = false; 
        let isBgmReady = false;
        
        let currentRawRouteName = ""; 
        let busTracker = {}; 

        const DB_NAME = "BusStop_Audio_Cache";
        const STORE_NAME = "music_store";
        const AUDIO_KEY = "bgm_music";

        const API_URL = 'https://public.bussing.app/gps-current/7';
        const CHECK_INTERVAL = 30000; 
        const WELCOME_INTERVAL = 300000; 
        const AVERAGE_SPEED_KMH = 15; 
        const ALERT_MINUTES = 2; 
        const GPS_BUFFER_KM = 0.05; 

        const uiText = {
            TH: { stop: "📍 ป้าย: รถเมล์เดิ้ล เทศกาลอีสานสร้างสรรค์", etaLabel: "รถจะถึงในอีก", etaUnit: "นาที", routeLabel: "สายรถ:", carLabel: "เบอร์รถ:", distLabel: "ระยะทาง:", distUnit: "กม.", searching: "กำลังค้นหา...", sleepTitle: "นอกเวลาให้บริการ" },
            EN: { stop: "📍 Stop: Modern Bus Stop, Isaan Creative Festival", etaLabel: "Arriving in", etaUnit: "Mins", routeLabel: "Route:", carLabel: "Bus No:", distLabel: "Distance:", distUnit: "km", searching: "Searching...", sleepTitle: "Out of Service" },
            CN: { stop: "📍 站点: 现代巴士站", etaLabel: "即将到达", etaUnit: "分钟", routeLabel: "路线:", carLabel: "车号:", distLabel: "距离:", distUnit: "公里", searching: "搜索中...", sleepTitle: "非营业时间" },
        

        const routeDict = {
            "สาย": { EN: "Route ", CN: "路线 ", LA: "ສາຍ " },
            "สนามบิน": { EN: "Airport", CN: "机场", LA: "สะสนามบิน" },
            "บขส.3": { EN: "Terminal 3", CN: "3号客运站", LA: "บขส.3" },
            "บขส.": { EN: "Bus Terminal ", CN: "客运站 ", LA: "บขส." },
            "มข.": { EN: "KKU", CN: "孔敬大学", LA: "ม.ขอนแก่น" },
            "มหาวิทยาลัยขอนแก่น": { EN: "Khon Kaen Univ.", CN: "孔敬大学", LA: "มหาวิทยาลัยขอนแก่น" },
            "เซ็นทรัล": { EN: "Central", CN: "中央广场", LA: "เซ็นโทร" }
        };

        window.addEventListener('load', () => { 
            autoUnlockAudioCtx();
            setupLocalBGM();
            initApp(); 
        });

        function autoUnlockAudioCtx() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume().catch(e => log("รอเบราว์เซอร์อนุมัติเสียง..."));
        }

        function setupLocalBGM() {
            let request = indexedDB.open(DB_NAME, 1);
            request.onupgradeneeded = (e) => {
                let db = e.target.result;
                if (!db.objectStoreNames.contains(STORE_NAME)) db.createObjectStore(STORE_NAME);
            };
            request.onsuccess = (e) => {
                let db = e.target.result;
                let transaction = db.transaction(STORE_NAME, "readonly");
                let store = transaction.objectStore(STORE_NAME);
                let getMusic = store.get(AUDIO_KEY);

                getMusic.onsuccess = async (evt) => {
                    let blob = evt.target.result;
                    const bgMusic = document.getElementById('bg-music');
                    bgMusic.volume = 0.15; 

                    if (blob) {
                        log("💾 พบเพลงในเครื่อง! กำลังเปิดอัตโนมัติ...");
                        bgMusic.src = URL.createObjectURL(blob);
                        isBgmReady = true;
                        tryPlayBGM();
                    } else {
                        log("🌐 กำลังเซฟเพลงลงเครื่องครั้งแรก...");
                        try {
                            let response = await fetch("music.mp3");
                            let fetchedBlob = await response.blob();
                            let saveTransaction = db.transaction(STORE_NAME, "readwrite");
                            saveTransaction.objectStore(STORE_NAME).put(fetchedBlob, AUDIO_KEY);
                            bgMusic.src = URL.createObjectURL(fetchedBlob);
                            isBgmReady = true;
                            tryPlayBGM();
                        } catch (err) {
                            bgMusic.src = "music.mp3";
                            isBgmReady = true;
                            tryPlayBGM();
                        }
                    }
                };
            };
            request.onerror = () => {
                document.getElementById('bg-music').src = "music.mp3";
                isBgmReady = true;
                tryPlayBGM();
            };
        }

        function tryPlayBGM() {
            const bgMusic = document.getElementById('bg-music');
            if (isBgmReady && bgMusic) {
                bgMusic.play()
                .then(() => log("🎵 เปิดเสียงเพลงสำเร็จอัตโนมัติ!"))
                .catch(err => {
                    log("⚠️ เสียงถูกบล็อกโดยเบราว์เซอร์ (โปรดตั้งค่า Chrome ตามวิธีด้านล่าง)");
                    setTimeout(tryPlayBGM, 2000);
                });
            }
        }

        function translateRouteName(rawName, lang) {
            if (!rawName) return uiText[lang].searching;
            if (lang === 'TH') return rawName; 

            let translated = rawName;
            for (const [thWord, translations] of Object.entries(routeDict)) {
                const regex = new RegExp(thWord, "gi"); 
                translated = translated.replace(regex, translations[lang]);
            }
            return translated;
        }

        function log(msg) {
            const logDiv = document.getElementById('log');
            logDiv.innerHTML += `<div>> ${msg}</div>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function isSleepMode() {
            const hour = new Date().getHours();
            return (hour >= 20 || hour < 5);
        }

        function updateRouteNameMarquee(text) {
            const container = document.getElementById('route-wrapper');
            const content = document.getElementById('bus-route-name');
            content.innerText = text;
            content.classList.remove('scroll');
            setTimeout(() => {
                if (content.scrollWidth > container.clientWidth) {
                    const scrollDistance = container.clientWidth - content.scrollWidth;
                    content.style.setProperty('--scroll-dist', `${scrollDistance}px`);
                    content.classList.add('scroll'); 
                }
            }, 100);
        }

        function setUILanguage(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.innerText === lang || (lang === 'CN' && btn.innerText === '中文') || (lang === 'LA' && btn.innerText === 'ລາວ')) {
                    btn.classList.add('active');
                }
            });
            document.getElementById('ui-stop-name').innerText = uiText[lang].stop;
            document.getElementById('ui-eta-label').innerText = uiText[lang].etaLabel;
            document.getElementById('ui-eta-unit').innerText = uiText[lang].etaUnit;
            document.getElementById('ui-route-label').innerText = uiText[lang].routeLabel;
            document.getElementById('ui-car-label').innerText = uiText[lang].carLabel;
            document.getElementById('ui-dist-label').innerText = uiText[lang].distLabel;
            document.getElementById('ui-dist-unit').innerText = uiText[lang].distUnit;
            document.getElementById('ui-sleep-title').innerText = uiText[lang].sleepTitle;
            
            if (currentRawRouteName) {
                updateRouteNameMarquee(translateRouteName(currentRawRouteName, lang));
            } else {
                updateRouteNameMarquee(uiText[lang].searching);
            }
        }

        function loadVoices() { availableVoices = window.speechSynthesis.getVoices(); }
        if ('speechSynthesis' in window) { loadVoices(); window.speechSynthesis.onvoiceschanged = loadVoices; }

        function getBestVoiceForLang(langCode) {
            let voice = availableVoices.find(v => v.lang === langCode || v.lang === langCode.replace('-', '_'));
            if (!voice) voice = availableVoices.find(v => v.lang.startsWith(langCode.split('-')[0]));
            return voice;
        }

        function playChime() {
            autoUnlockAudioCtx();
            if (audioCtx && audioCtx.state === 'running') {
                const playNote = (freq, startTime, duration) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sine'; osc.frequency.setValueAtTime(freq, startTime);
                    gain.gain.setValueAtTime(0.2, startTime); gain.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.start(startTime); osc.stop(startTime + duration);
                };
                const now = audioCtx.currentTime; playNote(523.25, now, 0.8); playNote(392.00, now + 0.5, 0.8); 
            }
        }

        async function initApp() {
            appStarted = true;
            if (isSleepMode()) {
                document.getElementById('view-sleep').style.display = 'flex';
                document.getElementById('view-tracking').style.display = 'none';
            } else {
                document.getElementById('view-sleep').style.display = 'none';
                document.getElementById('view-tracking').style.display = 'flex';
                announceWelcome(); 
            }
            setInterval(announceWelcome, WELCOME_INTERVAL);
            fetchAndCheckBus(); setInterval(fetchAndCheckBus, CHECK_INTERVAL);
        }

        function announceWelcome() {
            if (isSleepMode()) return; 
            const th = "สวัสดีขอนแก่น ผู้โดยสารขอนแก่นซิตี้บัส โปรดทราบ ขณะนี้ท่านอยู่ที่ป้าย รถเมล์เดิ้ล เทศกาลอีสานสร้างสรรค์ ท่านสามารถรอรถเพื่อเดินทางไปยังสนามบิน หรือข้ามถนนไปยังป้ายรถเมล์ฝั่งตรงข้าม เพื่อเดินทางไป สถานีขนส่งแห่งที่ 3 ระบบจะทำการแจ้งเตือนให้ทราบอีกครั้ง เมื่อรถใกล้เข้าจอด";
            
            // ปรับปรุง: ใช้ single quotes ครอบสายอักษรภาษาอังกฤษ เพื่อแก้ปัญหา Syntax Error บล็อกระบบ
            const en = 'Hello Khon Kaen City Bus passengers, please note that you are currently at the "Bus Stop at Isan Creative Festival" stop. You can wait for a bus to the airport or cross the road to the opposite bus stop to go to Bus Terminal 3. The system will notify you again when the bus is approaching.';
            const cn = "孔敬市公交车乘客们，您好！您目前位于“伊桑创意节公交站”。您可以在此等候前往机场的公交车，或者过马路到对面公交站前往3号巴士总站。公交车即将到达时，系统会再次通知您。";
            
            speakAlertMultiLang(th, en, cn, true);
        }

        async function fetchAndCheckBus() {
            if (isSleepMode()) {
                if (appStarted) {
                    document.getElementById('view-tracking').style.display = 'none';
                    document.getElementById('view-sleep').style.display = 'flex';
                    document.body.classList.remove('flash-green'); 
                } return; 
            } else if (appStarted && document.getElementById('view-sleep').style.display === 'flex') {
                document.getElementById('view-sleep').style.display = 'none';
                document.getElementById('view-tracking').style.display = 'flex';
                isFirstCalculation = true; 
            }

            try {
                const freshProxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(API_URL + '?t=' + new Date().getTime());
                const response = await fetch(freshProxyUrl);
                const result = await response.json();
                const buses = result.data;

                if (buses && buses.length > 0) {
                    let closestBus = null;
                    let minDistance = Infinity;

                    buses.forEach(bus => {
                        const carId = bus.gps_car_id;
                        const currentDist = calculateDistance(TARGET_STOP_LAT, TARGET_STOP_LNG, parseFloat(bus.gps_lat), parseFloat(bus.gps_long));
                        let isApproaching = true; 

                        if (busTracker[carId]) {
                            const prevDist = busTracker[carId].distance;
                            if (currentDist > prevDist + GPS_BUFFER_KM) {
                                isApproaching = false;
                            } else if (currentDist < prevDist - 0.01) {
                                isApproaching = true;
                            } else {
                                isApproaching = busTracker[carId].isApproaching;
                            }
                        }
                        busTracker[carId] = { distance: currentDist, isApproaching: isApproaching };

                        if (isApproaching && currentDist < minDistance) {
                            minDistance = currentDist; closestBus = bus;
                        }
                    });

                    if (closestBus) {
                        let etaMinutes = Math.round((minDistance / AVERAGE_SPEED_KMH) * 60);
                        if (etaMinutes <= 0 && minDistance > 0) etaMinutes = 1;

                        currentRawRouteName = closestBus.gps_route_name;
                        updateRouteNameMarquee(translateRouteName(currentRawRouteName, currentLang));
                        
                        document.getElementById('bus-car-id').innerText = closestBus.gps_car_id;
                        document.getElementById('eta-mins').innerText = etaMinutes;
                        document.getElementById('distance-km').innerText = minDistance.toFixed(2);
                        
                        if (etaMinutes <= ALERT_MINUTES) { document.body.classList.add('flash-green'); } 
                        else { document.body.classList.remove('flash-green'); }
                        
                        const speechLevels = [10, 5, 2, 1];
                        if (isFirstCalculation || (speechLevels.includes(etaMinutes) && etaMinutes !== lastSpokenEta)) {
                            const routeNumMatch = currentRawRouteName.match(/\d+/);
                            const routeNum = routeNumMatch ? routeNumMatch[0] : "";
                            
                            // ปรับปรุง: แจ้งเตือนภาษาลาวด้วยคำอ่านภาษาไทยสะกดตามสำเนียง
                            speakAlertMultiLang(
                                `ผู้โดยสารโปรดทราบ รถเมล์สาย ${routeNum} จะเข้าจอดในอีกประมาณ ${etaMinutes} นาที`, 
                                `Attention, Route ${routeNum} will arrive in approximately ${etaMinutes} minutes.`, 
                                `请注意，${routeNum} 号线将在大约 ${etaMinutes} 分钟后到达。`,
                            false);
                            lastSpokenEta = etaMinutes; isFirstCalculation = false; 
                        }
                    } else {
                        currentRawRouteName = "";
                        updateRouteNameMarquee(uiText[currentLang].searching);
                        document.getElementById('bus-car-id').innerText = "--";
                        document.getElementById('eta-mins').innerText = "-";
                        document.getElementById('distance-km').innerText = "-.-";
                        document.body.classList.remove('flash-green');
                    }
                } else {
                    currentRawRouteName = "";
                    updateRouteNameMarquee(uiText[currentLang].searching);
                    document.getElementById('bus-car-id').innerText = "--";
                    document.getElementById('eta-mins').innerText = "-";
                    document.getElementById('distance-km').innerText = "-.-";
                    document.body.classList.remove('flash-green');
                }
            } catch (err) { log("Error: " + err.message); }
        }

        function speakAlertMultiLang(th, en, cn, la, isWelcome) {
            if ('speechSynthesis' in window) {
                if (!isWelcome) window.speechSynthesis.cancel(); 
                
                const bgMusic = document.getElementById('bg-music');
                if (bgMusic) bgMusic.pause();

                playChime();
                
                setTimeout(() => {
                    // ปรับปรุง: สั่งรหัสภาษาลาว (la) ให้ทำงานบนเสียง th-TH และปรับลดความสูงของเสียงลงเล็กน้อย (pitch: 0.9)
                    const utterancesData = [
                        { text: th, langCode: 'th-TH', pitch: 1.1, rate: 1.0 }, 
                        { text: en, langCode: 'en-US', pitch: 1.0, rate: 0.9 },
                        { text: cn, langCode: 'zh-CN', pitch: 1.0, rate: 0.9 },
                    ];
                    
                    const activeUtterances = [];
                    
                    utterancesData.forEach(item => {
                        let msg = new SpeechSynthesisUtterance(item.text);
                        msg.lang = item.langCode; msg.pitch = item.pitch; msg.rate = item.rate;
                        
                        const specificVoice = getBestVoiceForLang(item.langCode);
                        if (specificVoice) {
                            msg.voice = specificVoice;
                            activeUtterances.push(msg);
                        } else { 
                            // ปรับปรุง: ลบส่วนการดักคัดกรอง th-TH ออกเพื่อให้ประโยคลาวที่ถูกจำลองเข้าทำงานได้สมบูรณ์
                            activeUtterances.push(msg);
                        }
                    });

                    if (activeUtterances.length > 0) {
                        activeUtterances[activeUtterances.length - 1].onend = () => {
                            if (bgMusic && !isSleepMode()) {
                                bgMusic.play().catch(err => {});
                            }
                        };
                        activeUtterances[activeUtterances.length - 1].onerror = () => {
                            if (bgMusic && !isSleepMode()) {
                                bgMusic.play().catch(err => {});
                            }
                        };
                        activeUtterances.forEach(msg => window.speechSynthesis.speak(msg));
                    } else {
                        if (bgMusic && !isSleepMode()) bgMusic.play().catch(err => {});
                    }
                }, 1200); 
            }
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; const dLat = (lat2 - lat1) * Math.PI / 180; const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }
    </script>
