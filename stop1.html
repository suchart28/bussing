<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bus Alert - Khon Kaen City Bus</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { 
            background-color: #000000; color: #FFFFFF; height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }
        
        .app-container { flex: 1; display: flex; flex-direction: column; padding: 20px 15px; }
        
        /* ส่วนหัวและโลโก้ */
        header { text-align: center; margin-bottom: 15px; }
        .logo { width: 60%; max-width: 250px; height: auto; margin: 0 auto 10px auto; display: block; }
        .stop-status { font-size: 14px; color: #00e676; font-weight: bold; background: #111; padding: 8px 15px; border-radius: 50px; display: inline-block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%;}

        /* เมนูสลับภาษา */
        .lang-switcher { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; display: none; }
        .lang-btn { flex: 1; padding: 12px; background: #222; color: #aaa; border: 2px solid #333; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .lang-btn.active { background: #00e676; color: #000; border-color: #00c853; }

        /* ส่วนแสดงผลหลัก (เน้นตัวใหญ่) */
        .main-display { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; width: 100%; }
        
        .eta-container { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; width: 100%; }
        .eta-label { color: #aaa; font-size: 5vw; min-font-size: 18px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: -10px; }
        /* ตัวเลขนาทีใหญ่ตะโกน */
        .eta-value { font-size: 45vw; font-weight: 900; color: #FFFFFF; line-height: 1; text-shadow: 0 10px 30px rgba(0,230,118,0.4); margin: 10px 0; }
        .eta-unit { color: #00e676; font-size: 8vw; font-weight: bold; margin-top: -10px; }

        /* การ์ดข้อมูลรถด้านล่าง */
        .bus-info-card { background: linear-gradient(145deg, #1a1a1a, #111); width: 100%; border-radius: 20px; padding: 20px; margin-bottom: 10px; border: 1px solid #333; display: flex; flex-direction: column; gap: 10px; }
        .info-row { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .info-row:last-child { border-bottom: none; padding-bottom: 0; }
        .info-label { color: #888; font-size: 16px; }
        .info-value { color: #fff; font-size: 20px; font-weight: bold; }
        .info-value.highlight { color: #00e676; font-size: 24px; }

        /* ปุ่มเริ่มต้น */
        #view-start { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .btn-huge { background: linear-gradient(135deg, #00c853 0%, #00e676 100%); color: #000; border: none; width: 100%; padding: 22px; font-size: 20px; font-weight: bold; border-radius: 50px; cursor: pointer; box-shadow: 0 10px 20px rgba(0,230,118,0.3); }
        
        #log { font-size: 11px; color: #666; height: 50px; overflow-y: scroll; background: #050505; padding: 5px 10px; border-top: 1px solid #111; }
        
        /* Responsive สำหรับจอแนวนอนหรือจอใหญ่ */
        @media (min-width: 600px) {
            .eta-value { font-size: 250px; }
            .eta-label { font-size: 24px; }
            .eta-unit { font-size: 40px; }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <img src="bussing.png" alt="BUSSING TRANSIT" class="logo" onerror="this.style.display='none'; document.getElementById('alt-logo').style.display='block';">
            <h1 id="alt-logo" style="display:none; font-size: 30px; color: #ff007f;">BUSSING<span style="color:#00e676">TRANSIT</span></h1>
            <div class="stop-status" id="ui-stop-name">📍 ป้าย: เซ็นทรัลพลาซ่า ขอนแก่น</div>
        </header>

        <div class="lang-switcher" id="lang-menu">
            <button class="lang-btn active" onclick="setUILanguage('TH')">TH</button>
            <button class="lang-btn" onclick="setUILanguage('EN')">EN</button>
            <button class="lang-btn" onclick="setUILanguage('CN')">中文</button>
        </div>

        <div id="view-start">
            <p style="color:#aaa; text-align:center; font-size: 18px; line-height: 1.6; margin-bottom: 30px;">
                ระบบแจ้งเตือนป้ายรถเมล์อัจฉริยะ<br>กำลังโหลดชุดเสียงบนอุปกรณ์ของคุณ...
            </p>
            <button id="start-btn" class="btn-huge" onclick="initApp()">🔊 เริ่มระบบประกาศสาธารณะ</button>
        </div>

        <div id="view-tracking" class="main-display" style="display:none;">
            <div class="eta-container">
                <div class="eta-label" id="ui-eta-label">รถจะถึงในอีก</div>
                <div class="eta-value" id="eta-mins">-</div>
                <div class="eta-unit" id="ui-eta-unit">นาที</div>
            </div>

            <div class="bus-info-card">
                <div class="info-row">
                    <div class="info-label" id="ui-route-label">สายรถ:</div>
                    <div class="info-value highlight" id="bus-route-name">กำลังค้นหา...</div>
                </div>
                <div class="info-row">
                    <div class="info-label" id="ui-car-label">เบอร์รถ:</div>
                    <div class="info-value" id="bus-car-id">--</div>
                </div>
                <div class="info-row">
                    <div class="info-label" id="ui-dist-label">ระยะทาง:</div>
                    <div class="info-value"><span id="distance-km">-.-</span> <span id="ui-dist-unit">กม.</span></div>
                </div>
            </div>
        </div>
    </div>

    <div id="log">เตรียมความพร้อมระบบ...</div>

    <script>
        const TARGET_STOP_LAT = 16.432924;  
        const TARGET_STOP_LNG = 102.823528; 

        let lastSpokenEta = null;
        let isFirstCalculation = true;
        let audioCtx = null;
        let availableVoices = [];
        let currentLang = 'TH'; // ภาษาเริ่มต้นของหน้าจอ

        const API_URL = 'https://public.bussing.app/gps-current/7';
        const CHECK_INTERVAL = 30000; 
        const WELCOME_INTERVAL = 300000; 
        const AVERAGE_SPEED_KMH = 15; 

        // 🎯 ดิกชันนารีสำหรับเปลี่ยนข้อความบนหน้าจอ UI
        const uiText = {
            TH: { stop: "📍 ป้าย: เซ็นทรัลพลาซ่า ขอนแก่น", etaLabel: "รถจะถึงในอีก", etaUnit: "นาที", routeLabel: "สายรถ:", carLabel: "เบอร์รถ:", distLabel: "ระยะทาง:", distUnit: "กม.", searching: "กำลังค้นหา..." },
            EN: { stop: "📍 Stop: Central Plaza Khon Kaen", etaLabel: "Arriving in", etaUnit: "Mins", routeLabel: "Route:", carLabel: "Bus No:", distLabel: "Distance:", distUnit: "km", searching: "Searching..." },
            CN: { stop: "📍 站点: 孔敬中央广场", etaLabel: "即将到达", etaUnit: "分钟", routeLabel: "路线:", carLabel: "车号:", distLabel: "距离:", distUnit: "公里", searching: "搜索中..." }
        };

        function log(msg) {
            const logDiv = document.getElementById('log');
            logDiv.innerHTML += `<div>> ${msg}</div>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        // 🎯 ฟังก์ชันสลับภาษาบนหน้าจอ (ไม่กระทบเสียงพูด)
        function setUILanguage(lang) {
            currentLang = lang;
            
            // เปลี่ยนสีปุ่มเมนู
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.innerText === lang || (lang === 'CN' && btn.innerText === '中文')) {
                    btn.classList.add('active');
                }
            });

            // เปลี่ยนข้อความบนจอ
            document.getElementById('ui-stop-name').innerText = uiText[lang].stop;
            document.getElementById('ui-eta-label').innerText = uiText[lang].etaLabel;
            document.getElementById('ui-eta-unit').innerText = uiText[lang].etaUnit;
            document.getElementById('ui-route-label').innerText = uiText[lang].routeLabel;
            document.getElementById('ui-car-label').innerText = uiText[lang].carLabel;
            document.getElementById('ui-dist-label').innerText = uiText[lang].distLabel;
            document.getElementById('ui-dist-unit').innerText = uiText[lang].distUnit;
            
            if (document.getElementById('bus-route-name').innerText === uiText['TH'].searching || 
                document.getElementById('bus-route-name').innerText === uiText['EN'].searching || 
                document.getElementById('bus-route-name').innerText === uiText['CN'].searching) {
                document.getElementById('bus-route-name').innerText = uiText[lang].searching;
            }
        }

        function loadVoices() {
            availableVoices = window.speechSynthesis.getVoices();
        }

        if ('speechSynthesis' in window) {
            loadVoices();
            if (window.speechSynthesis.onvoiceschanged !== undefined) {
                window.speechSynthesis.onvoiceschanged = loadVoices;
            }
        }

        function getBestVoiceForLang(langCode) {
            let voice = availableVoices.find(v => v.lang === langCode || v.lang === langCode.replace('-', '_'));
            if (!voice) {
                const prefix = langCode.split('-')[0];
                voice = availableVoices.find(v => v.lang.startsWith(prefix));
            }
            return voice;
        }

        function playChime() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const playNote = (freq, startTime, duration) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, startTime);
                gain.gain.setValueAtTime(0.2, startTime);
                gain.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(startTime); osc.stop(startTime + duration);
            };
            const now = audioCtx.currentTime;
            playNote(523.25, now, 0.8); 
            playNote(392.00, now + 0.5, 0.8); 
        }

        async function initApp() {
            if ('speechSynthesis' in window) {
                let silentUtterance = new SpeechSynthesisUtterance('');
                window.speechSynthesis.speak(silentUtterance);
            }

            document.getElementById('view-start').style.display = 'none';
            document.getElementById('view-tracking').style.display = 'flex';
            document.getElementById('lang-menu').style.display = 'flex'; // แสดงเมนูภาษา
            
            announceWelcome();
            setInterval(announceWelcome, WELCOME_INTERVAL);

            fetchAndCheckBus();
            setInterval(fetchAndCheckBus, CHECK_INTERVAL);
        }

        function announceWelcome() {
            log("📢 ประกาศต้อนรับ (ข้อความใหม่)");
            // 🎯 อัปเดตข้อความต้อนรับใหม่ ตามที่ลูกค้าระบุ
            const th = "สวัสดีขอนแก่น ผู้โดยสารขอนแก่นซิตี้บัส โปรดทราบ ขณะนี้ท่านอยู่ที่ป้าย เซ็นทรัลพลาซ่าขอนแก่น ท่านสามารถรอรถเพื่อเดินทางไปยังสนามบิน หรือข้ามถนนไปยังป้ายรถเมล์ฝั่งตรงข้าม เพื่อเดินทางไปสถานีขนส่งผู้โดยสารแห่งที่ 3 ระบบจะทำการแจ้งเตือนให้ทราบอีกครั้ง เมื่อรถใกล้เข้าจอด";
            const en = "Hello Khon Kaen. Attention Khon Kaen City Bus passengers. You are currently at the Central Plaza Khon Kaen stop. You can wait here for the bus to the airport, or cross the street to the opposite bus stop to travel to Passenger Terminal 3. The system will notify you again when the bus is approaching.";
            const cn = "你好，孔敬。孔敬城市巴士的乘客请注意，您现在位于孔敬中央广场站。您可以在此等候前往机场的巴士，或过马路到对面的公交站乘车前往三号客运站。当巴士快到时，系统会再次通知您。";

            speakAlertMultiLang(th, en, cn, true);
        }

        async function fetchAndCheckBus() {
            try {
                const cacheBuster = '?t=' + new Date().getTime();
                const freshProxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(API_URL + cacheBuster);
                const response = await fetch(freshProxyUrl);
                const result = await response.json();
                const buses = result.data;

                if (buses && buses.length > 0) {
                    let closestBus = null;
                    let minDistance = Infinity;

                    buses.forEach(bus => {
                        const distance = calculateDistance(TARGET_STOP_LAT, TARGET_STOP_LNG, parseFloat(bus.gps_lat), parseFloat(bus.gps_long));
                        if (distance < minDistance) { minDistance = distance; closestBus = bus; }
                    });

                    let etaMinutes = Math.round((minDistance / AVERAGE_SPEED_KMH) * 60);
                    if (etaMinutes <= 0 && minDistance > 0) etaMinutes = 1;

                    // อัปเดตข้อมูลรถ
                    document.getElementById('bus-route-name').innerText = closestBus.gps_route_name.split(':')[0]; // ตัดให้สั้นลง
                    document.getElementById('bus-car-id').innerText = closestBus.gps_car_id;
                    document.getElementById('eta-mins').innerText = etaMinutes;
                    document.getElementById('distance-km').innerText = minDistance.toFixed(2);
                    
                    const speechLevels = [10, 5, 2, 1];
                    if (isFirstCalculation || (speechLevels.includes(etaMinutes) && etaMinutes !== lastSpokenEta)) {
                        const routeTextTH = closestBus.gps_route_name.split(':')[0]; 
                        const carId = closestBus.gps_car_id;
                        
                        const textTH = `ผู้โดยสารโปรดทราบ รถเมล์สาย${routeTextTH} จะเข้าจอดในอีกประมาณ ${etaMinutes} นาที`;
                        const textEN = `Attention, bus number ${carId} will arrive in approximately ${etaMinutes} minutes.`;
                        const textCN = `请注意，${carId} 号公交车将在大约 ${etaMinutes} 分钟后到达。`;
                        
                        speakAlertMultiLang(textTH, textEN, textCN, false);
                        lastSpokenEta = etaMinutes;
                        isFirstCalculation = false; 
                    }
                } else {
                    document.getElementById('bus-route-name').innerText = uiText[currentLang].searching;
                    document.getElementById('eta-mins').innerText = "-";
                    document.getElementById('distance-km').innerText = "-.-";
                }
            } catch (err) { log("Error: " + err.message); }
        }

        function speakAlertMultiLang(th, en, cn, isWelcome) {
            if ('speechSynthesis' in window) {
                if (!isWelcome) window.speechSynthesis.cancel(); 

                playChime();

                setTimeout(() => {
                    const utterances = [
                        { text: th, langCode: 'th-TH', pitch: 1.1, rate: 1.0 }, 
                        { text: en, langCode: 'en-US', pitch: 1.0, rate: 0.9 },
                        { text: cn, langCode: 'zh-CN', pitch: 1.0, rate: 0.9 }
                    ];

                    utterances.forEach(item => {
                        let msg = new SpeechSynthesisUtterance(item.text);
                        msg.lang = item.langCode;
                        msg.pitch = item.pitch;
                        msg.rate = item.rate;
                        
                        const specificVoice = getBestVoiceForLang(item.langCode);
                        if (specificVoice) {
                            msg.voice = specificVoice;
                        }

                        window.speechSynthesis.speak(msg);
                    });
                }, 1200);
            }
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }
    </script>
</body>
</html>
