<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bus Alert - ระบบแจ้งเตือนรถเมล์</title>
    <style>
        body { font-family: 'Tahoma', sans-serif; background-color: #f0f2f5; text-align: center; padding: 20px; color: #333; }
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 400px; margin: 0 auto; }
        button { background-color: #28a745; color: white; border: none; padding: 15px 30px; font-size: 18px; border-radius: 50px; cursor: pointer; transition: 0.3s; width: 100%; margin-top: 20px; }
        button:hover { background-color: #218838; }
        .status { margin-top: 20px; font-weight: bold; color: #555; }
        .info { font-size: 14px; color: #777; margin-top: 10px; }
        #log { text-align: left; font-size: 12px; background: #eee; padding: 10px; border-radius: 5px; margin-top: 20px; height: 100px; overflow-y: scroll; }
    </style>
</head>
<body>

    <div class="card">
        <h2>🚌 ระบบแจ้งเตือนรถเมล์</h2>
        <p>สาย: เขียว (สนามบิน-บขส.3)</p>
        
        <div id="status-text" class="status">กดปุ่มเริ่มเพื่ออนุญาตพิกัดและเสียง</div>
        <button id="start-btn" onclick="initApp()">เริ่มระบบแจ้งเตือน</button>
        
        <div class="info" id="location-info">ตำแหน่งของคุณ: รอการตรวจสอบ...</div>
    </div>

    <div id="log">--- ระบบพร้อมทำงาน ---</div>

    <script>
        let userLat, userLng;
        const API_URL = 'https://public.bussing.app/gps-current/7';
        const PROXY_URL = 'https://corsproxy.io/?' + encodeURIComponent(API_URL);
        const CHECK_INTERVAL = 15000; // เช็คทุก 15 วินาที
        const AVERAGE_SPEED_KMH = 20; // สมมติความเร็วรถเมล์ในเมือง 20 กม./ชม.

        function log(msg) {
            const logDiv = document.getElementById('log');
            logDiv.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        async function initApp() {
            document.getElementById('start-btn').style.display = 'none';
            document.getElementById('status-text').innerText = "กำลังขอพิกัดผู้ใช้...";
            
            // 1. ขออนุญาตใช้ Geolocation
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(
                    (pos) => {
                        userLat = pos.coords.latitude;
                        userLng = pos.coords.longitude;
                        document.getElementById('location-info').innerText = `พิกัดของคุณ: ${userLat.toFixed(4)}, ${userLng.toFixed(4)}`;
                        log("อัปเดตพิกัดผู้ใช้แล้ว");
                    },
                    (err) => log("ข้อผิดพลาดพิกัด: " + err.message),
                    { enableHighAccuracy: true }
                );
                
                // เริ่มดึงข้อมูลรถเมล์ทันทีและตั้งรอบถัดไป
                fetchAndCheckBus();
                setInterval(fetchAndCheckBus, CHECK_INTERVAL);
            } else {
                alert("เบราว์เซอร์ไม่รองรับ GPS");
            }
        }

        async function fetchAndCheckBus() {
            if (!userLat || !userLng) return;

            try {
                log("กำลังตรวจสอบตำแหน่งรถเมล์...");
                const response = await fetch(PROXY_URL);
                const result = await response.json();
                const buses = result.data;

                if (buses && buses.length > 0) {
                    let closestBus = null;
                    let minDistance = Infinity;

                    buses.forEach(bus => {
                        const busLat = parseFloat(bus.gps_lat);
                        const busLng = parseFloat(bus.gps_long);
                        const distance = calculateDistance(userLat, userLng, busLat, busLng);

                        if (distance < minDistance) {
                            minDistance = distance;
                            closestBus = bus;
                        }
                    });

                    // คำนวณเวลา (นาที) = (ระยะทาง / ความเร็ว) * 60
                    const etaMinutes = Math.round((minDistance / AVERAGE_SPEED_KMH) * 60);

                    document.getElementById('status-text').innerText = `รถสาย ${closestBus.gps_route_name} อยู่ห่างจากคุณ ${minDistance.toFixed(2)} กม.`;
                    
                    log(`พบรถห่าง ${minDistance.toFixed(2)} กม. คาดว่าถึงใน ${etaMinutes} นาที`);

                    // ถ้าเหลือ 2, 5, หรือ 10 นาที ให้แจ้งเตือนด้วยเสียง
                    if (etaMinutes <= 10 && etaMinutes > 0) {
                        speak(`รถเมล์สาย ${closestBus.gps_route_name} จะถึงในอีกประมาณ ${etaMinutes} นาทีค่ะ`);
                    }
                }
            } catch (err) {
                log("ดึงข้อมูลล้มเหลว: " + err.message);
            }
        }

        // สูตร Haversine คำนวณระยะทางจากพิกัด (กม.)
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c;
        }

        // ฟังก์ชันเสียงพูดภาษาไทย
        function speak(text) {
            if ('speechSynthesis' in window) {
                // หยุดเสียงเก่าก่อนพูดใหม่
                window.speechSynthesis.cancel();
                const msg = new SpeechSynthesisUtterance(text);
                msg.lang = 'th-TH';
                window.speechSynthesis.speak(msg);
            }
        }
    </script>
</body>
</html>
