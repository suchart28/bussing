<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bus Alert - ระบบแจ้งเตือน</title>
    <style>
        /* Reset & Base Styles */
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #000000; /* Dark Mode แท้ */
            color: #FFFFFF;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .app-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 30px 20px;
        }

        /* ส่วนหัว: โลโก้ และ สถานะ GPS */
        header { text-align: center; margin-bottom: 20px; }
        .logo { width: 85%; max-width: 320px; height: auto; margin: 0 auto 15px auto; display: block; }
        .gps-status { font-size: 14px; color: #666; margin-top: 5px; }
        .gps-active { color: #00e676; font-weight: bold; }

        /* ส่วนกลาง: หน้าจอหลัก */
        .main-display {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* Card แสดงสายรถ */
        .bus-info-card {
            background-color: #1a1a1a;
            width: 100%;
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid #333;
        }
        .route-name { font-size: 18px; color: #00e676; font-weight: bold; margin-bottom: 5px; }
        .car-id { font-size: 14px; color: #888; }

        /* ตัวเลขเวลา (ETA) ใหญ่เต็มตา */
        .eta-container { margin: 20px 0; }
        .eta-label { font-size: 20px; color: #ccc; margin-bottom: -10px; }
        .eta-value { 
            font-size: 130px; 
            font-weight: 900; 
            color: #FFFFFF; 
            line-height: 1.1;
            text-shadow: 0 0 20px rgba(255,255,255,0.2);
        }
        .eta-unit { font-size: 24px; color: #ccc; margin-top: -15px; }

        /* ระยะทาง */
        .distance-display { font-size: 22px; color: #aaa; font-weight: 300; background: #222; padding: 10px 20px; border-radius: 50px;}
        .distance-value { font-weight: bold; color: #fff; }

        /* หน้าจอเริ่มต้น */
        #view-start {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
        }
        .instruction-text { font-size: 18px; color: #aaa; text-align: center; margin-bottom: 40px; line-height: 1.6; }

        #view-tracking { display: none; height: 100%; }

        /* ส่วนท้าย: ปุ่ม */
        footer { margin-top: 20px; }
        .btn-huge {
            background: linear-gradient(135deg, #00c853 0%, #00e676 100%);
            color: #000;
            border: none;
            width: 100%;
            padding: 22px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,230,118,0.3);
        }
        .btn-huge:active { transform: scale(0.97); }

        /* Log สำหรับ Debug (ซ่อนไว้ด้านล่าง) */
        #log { 
            font-size: 11px; color: #666; height: 50px; overflow-y: scroll; 
            background: #050505; padding: 5px 10px; border-top: 1px solid #111; text-align: left;
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <header>
            <img src="bussing.png" alt="BUSSING TRANSIT" class="logo" onerror="this.style.display='none'; document.getElementById('alt-logo').style.display='block';">
            <h1 id="alt-logo" style="display:none; font-size: 30px; color: #ff007f;">BUSSING<span style="color:#00e676">TRANSIT</span></h1>
            
            <div id="gps-stat" class="gps-status">⚪ รอพิกัด GPS...</div>
        </header>

        <div id="view-start">
            <p class="instruction-text">
                ระบบแจ้งเตือนพิกัดรถเมล์ด้วยเสียง<br>
                กรุณากดปุ่มด้านล่างเพื่ออนุญาต<br>พิกัด GPS และเสียงลำโพง
            </p>
        </div>

        <div id="view-tracking" class="main-display">
            <div class="bus-info-card">
                <div class="route-name" id="bus-route-name">กำลังค้นหารถ...</div>
                <div class="car-id" id="bus-car-id">--</div>
            </div>

            <div class="main-data">
                <div class="eta-container">
                    <div class="eta-label">จะถึงในอีกประมาณ</div>
                    <div class="eta-value" id="eta-mins">-</div>
                    <div class="eta-unit">นาที</div>
                </div>
                
                <div class="distance-display">
                    ระยะทาง <span class="distance-value" id="distance-km">-.-</span> กม.
                </div>
            </div>
        </div>

        <footer>
            <button id="start-btn" class="btn-huge" onclick="initApp()">🔊 เริ่มติดตามและแจ้งเตือน</button>
        </footer>
    </div>

    <div id="log">รอการเริ่มทำงาน...</div>

    <script>
        let userLat, userLng;
        let lastSpokenEta = null;
        let isFirstCalculation = true; // เอาไว้เช็คว่าคำนวณสำเร็จครั้งแรกหรือยัง

        const API_URL = 'https://public.bussing.app/gps-current/7';
        const PROXY_URL = 'https://corsproxy.io/?' + encodeURIComponent(API_URL);
        const CHECK_INTERVAL = 15000; // อัปเดตทุก 15 วินาที
        const AVERAGE_SPEED_KMH = 15; // ความเร็วรถวิ่งในเมือง (ปรับได้)

        function log(msg) {
            const logDiv = document.getElementById('log');
            logDiv.innerHTML += `<div>> ${msg}</div>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        // --- 1. เริ่มต้นระบบ ---
        async function initApp() {
            document.getElementById('start-btn').style.display = 'none';
            document.getElementById('view-start').style.display = 'none';
            document.getElementById('view-tracking').style.display = 'flex';
            
            // เปิดใช้งาน Speech Synthesis เพื่อให้เบราว์เซอร์ปลดล็อกเสียง
            let testSpeech = new SpeechSynthesisUtterance('');
            window.speechSynthesis.speak(testSpeech);

            log("กำลังขออนุญาตเข้าถึงพิกัด GPS...");
            
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(
                    (pos) => {
                        userLat = pos.coords.latitude;
                        userLng = pos.coords.longitude;
                        const gpsStat = document.getElementById('gps-stat');
                        gpsStat.innerText = `🟢 รับพิกัดสำเร็จ (${userLat.toFixed(4)}, ${userLng.toFixed(4)})`;
                        gpsStat.classList.add('gps-active');
                    },
                    (err) => {
                        log("GPS Error: " + err.message);
                        document.getElementById('gps-stat').innerText = "🔴 ไม่สามารถระบุตำแหน่งได้";
                        document.getElementById('gps-stat').classList.remove('gps-active');
                    },
                    { enableHighAccuracy: true }
                );
                
                // เรียกครั้งแรก และตั้งเวลารันซ้ำทุกๆ 15 วินาที
                fetchAndCheckBus();
                setInterval(fetchAndCheckBus, CHECK_INTERVAL);
            } else {
                alert("อุปกรณ์ของคุณไม่รองรับ GPS");
            }
        }

        // --- 2. ดึงข้อมูลรถและคำนวณ ---
        async function fetchAndCheckBus() {
            if (!userLat || !userLng) {
                log("รอพิกัดผู้ใช้ก่อนดึงข้อมูลรถ...");
                return;
            }

            try {
                const response = await fetch(PROXY_URL);
                const result = await response.json();
                const buses = result.data;

                if (buses && buses.length > 0) {
                    let closestBus = null;
                    let minDistance = Infinity;

                    // หาคันที่อยู่ใกล้ผู้ใช้มากที่สุด
                    buses.forEach(bus => {
                        const busLat = parseFloat(bus.gps_lat);
                        const busLng = parseFloat(bus.gps_long);
                        const distance = calculateDistance(userLat, userLng, busLat, busLng);

                        if (distance < minDistance) {
                            minDistance = distance;
                            closestBus = bus;
                        }
                    });

                    // คำนวณ ETA
                    let etaMinutes = Math.round((minDistance / AVERAGE_SPEED_KMH) * 60);
                    if (etaMinutes <= 0 && minDistance > 0) etaMinutes = 1; // ป้องกันเป็น 0

                    // อัปเดตหน้าจอ
                    document.getElementById('bus-route-name').innerText = `สาย: ${closestBus.gps_route_name}`;
                    document.getElementById('bus-car-id').innerText = `เบอร์รถ: ${closestBus.gps_car_id}`;
                    document.getElementById('eta-mins').innerText = etaMinutes;
                    document.getElementById('distance-km').innerText = minDistance.toFixed(1);
                    
                    log(`พบรถห่าง ${minDistance.toFixed(2)} กม. เวลา ${etaMinutes} นาที`);

                    // --- 3. ระบบอ่านออกเสียง ---
                    const routeText = closestBus.gps_route_name.split(':')[0]; // ดึงเฉพาะคำว่า "เขียว" หรือชื่อสายสั้นๆ

                    // เงื่อนไขการพูด: 
                    // 1. พูดทันทีเมื่อตรวจเจอครั้งแรก
                    // 2. พูดเมื่อเวลาลดลงเหลือ 10, 5, 2, 1 นาที (ไม่พูดซ้ำนาทีเดิม)
                    const speechLevels = [10, 5, 2, 1];
                    
                    if (isFirstCalculation || (speechLevels.includes(etaMinutes) && etaMinutes !== lastSpokenEta)) {
                        
                        let speakText = `พบรถเมล์สาย${routeText} ระยะทาง ${minDistance.toFixed(1)} กิโลเมตร คาดว่าจะมาถึงในอีกประมาณ ${etaMinutes} นาทีค่ะ`;
                        
                        speakAlert(speakText);
                        
                        lastSpokenEta = etaMinutes;
                        isFirstCalculation = false; // ปิดสถานะครั้งแรก
                    }
                    
                    // รีเซ็ตการพูด ถ้ารถติดหรืออยู่ไกลออกไป
                    if (etaMinutes > Math.max(...speechLevels) + 2) {
                        lastSpokenEta = null; 
                    }

                } else {
                    document.getElementById('bus-route-name').innerText = "ไม่พบรถในระบบ";
                    document.getElementById('eta-mins').innerText = "-";
                    document.getElementById('distance-km').innerText = "-.-";
                }
            } catch (err) {
                log("Fetch API ล้มเหลว: " + err.message);
            }
        }

        // --- 4. สูตรคำนวณระยะทาง Haversine ---
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; // รัศมีโลกเป็นกิโลเมตร
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c;
        }

        // --- 5. ฟังก์ชันส่งเสียงพูด ---
        function speakAlert(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); // ล้างคิวเสียงเก่า
                const msg = new SpeechSynthesisUtterance(text);
                msg.lang = 'th-TH'; // เสียงภาษาไทย
                msg.rate = 0.9;     // พูดช้าลงนิดนึงให้ฟังชัด
                msg.pitch = 1.0;
                window.speechSynthesis.speak(msg);
                log("🔊 อ่านออกเสียง: " + text);
            }
        }
    </script>
</body>
</html>
